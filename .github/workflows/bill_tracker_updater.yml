name: Bill Tracker Updater

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl python-dotenv

      - name: Run bill tracker updater
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python bill_tracker_updater.py

      - name: Commit updated tracker
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add "5.26.26 Climate Tracker v2.xlsx" bill_tracker_state.json
          git diff --staged --quiet || git commit -m "Auto-update bill tracker"
          git push
